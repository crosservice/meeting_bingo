# Meeting Bingo — Initial Nginx config (HTTP only, for certbot)
# This is deployed first so certbot can validate the domain.
# After TLS is obtained, meeting-bingo.conf replaces this.

upstream meeting_bingo_api {
    server 127.0.0.1:{{API_PORT}};
}

upstream meeting_bingo_web {
    server 127.0.0.1:{{WEB_PORT}};
}

server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}};

    # Logging
    access_log /var/log/nginx/meeting-bingo-access.log;
    error_log /var/log/nginx/meeting-bingo-error.log;

    # API routes
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://meeting_bingo_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://meeting_bingo_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
        proxy_pass http://meeting_bingo_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /auth/ {
        proxy_pass http://meeting_bingo_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://meeting_bingo_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
        proxy_pass http://meeting_bingo_web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /data/ {
        deny all;
        return 404;
    }
}
